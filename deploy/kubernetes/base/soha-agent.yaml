apiVersion: v1
kind: Namespace
metadata:
  name: soha-agent
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: soha-agent
  namespace: soha-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: soha-agent
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - endpoints
      - events
      - limitranges
      - namespaces
      - nodes
      - persistentvolumeclaims
      - persistentvolumes
      - pods
      - pods/log
      - resourcequotas
      - secrets
      - services
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - daemonsets
      - deployments
      - deployments/scale
      - replicasets
      - statefulsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - deployments/scale
    verbs: ["update", "patch"]
  - apiGroups: ["batch"]
    resources:
      - cronjobs
      - jobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - clusterrolebindings
      - clusterroles
      - rolebindings
      - roles
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources:
      - leases
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gateways
      - grpcroutes
      - httproutes
      - referencegrants
      - tcproutes
      - tlsroutes
      - udproutes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - nodes
      - pods
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: soha-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: soha-agent
subjects:
  - kind: ServiceAccount
    name: soha-agent
    namespace: soha-agent
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: soha-agent-config
  namespace: soha-agent
data:
  agent.config.yaml: |
    app:
      name: soha-agent
      env: production

    http:
      addr: :18080
      base_path: /api/v1
      read_timeout: 15s
      write_timeout: 15s
      allowed_origins: []

    logger:
      level: info
      format: json

    auth:
      bearer_token: ""

    security:
      allowed_actions:
        - platform.deployments.restart
        - platform.deployments.scale
        - platform.deployments.image
        - platform.deployments.rollback

    audit:
      file_path: /var/log/soha-agent/actions.jsonl

    control_plane:
      enabled: true
      base_url: https://soha.example.com
      bearer_token: ""
      agent_id: production-agent
      runtime_endpoint: http://soha-agent.soha-agent.svc.cluster.local:18080
      poll_interval: 5s
      max_concurrency: 2
      default_timeout: 30m
      callback_retry:
        max_attempts: 3
        backoff: 500ms
      provider_kinds:
        - ci_agent_runner
      workspace_root: /var/lib/soha-agent
      docker:
        enabled: false
        worker_id: ""
        host_ids: []
        operation_kinds: []
        compose_root: /var/lib/soha-agent/docker
        poll_interval: 5s
      agent_runtime:
        enabled: false
        worker_id: ""
        provider_ids: []
        provider_kinds: []
        hermes_command: hermes
        workspace_root: /var/lib/soha-agent/runtime
        poll_interval: 5s
        providers: {}

    kubernetes:
      enabled: true
      id: production-agent
      name: Production Agent
      kubeconfig: ""
      context: ""
      region: production
      environment: production
      labels:
        provider: agent
        owner: platform
---
apiVersion: v1
kind: Secret
metadata:
  name: soha-agent-secrets
  namespace: soha-agent
type: Opaque
stringData:
  agent-bearer-token: change-me
  control-plane-bearer-token: change-me
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: soha-agent-state
  namespace: soha-agent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: soha-agent
  namespace: soha-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: soha-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: soha-agent
        app.kubernetes.io/part-of: opensoha
    spec:
      serviceAccountName: soha-agent
      containers:
        - name: soha-agent
          image: ghcr.io/opensoha/soha-agent:v0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 18080
          env:
            - name: SOHA_AGENT_CONFIG_FILE
              value: /etc/soha-agent/agent.config.yaml
            - name: SOHA_AGENT_CONTROL_PLANE_BASE_URL
              value: https://soha.example.com
            - name: SOHA_AGENT_CONTROL_PLANE_AGENT_ID
              value: production-agent
            - name: SOHA_AGENT_CONTROL_PLANE_PROVIDER_KINDS
              value: ci_agent_runner
            - name: SOHA_AGENT_CONTROL_PLANE_DOCKER_ENABLED
              value: "false"
            - name: SOHA_AGENT_CONTROL_PLANE_AGENT_RUNTIME_ENABLED
              value: "false"
            - name: SOHA_AGENT_KUBERNETES_ENABLED
              value: "true"
            - name: SOHA_AGENT_AUTH_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: soha-agent-secrets
                  key: agent-bearer-token
            - name: SOHA_AGENT_CONTROL_PLANE_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: soha-agent-secrets
                  key: control-plane-bearer-token
          volumeMounts:
            - name: config
              mountPath: /etc/soha-agent
              readOnly: true
            - name: state
              mountPath: /var/log/soha-agent
              subPath: logs
            - name: state
              mountPath: /var/lib/soha-agent
              subPath: data
          readinessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: soha-agent-config
        - name: state
          persistentVolumeClaim:
            claimName: soha-agent-state
---
apiVersion: v1
kind: Service
metadata:
  name: soha-agent
  namespace: soha-agent
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: soha-agent
  ports:
    - name: http
      port: 18080
      targetPort: http
