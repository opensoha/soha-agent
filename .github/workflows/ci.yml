name: agent-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout agent
        uses: actions/checkout@v4
        with:
          path: soha-agent
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: soha-agent/go.sum
      - name: Test
        working-directory: soha-agent
        run: GOWORK=off go test ./...
      - name: Race test
        working-directory: soha-agent
        run: GOWORK=off go test -race ./...
      - name: Lint
        working-directory: soha-agent
        run: GOWORK=off go vet ./...
      - name: Govulncheck
        working-directory: soha-agent
        run: GOWORK=off go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...
      - name: Build
        working-directory: soha-agent
        run: GOWORK=off CGO_ENABLED=0 go build -o /tmp/soha-agent ./cmd/agent
      - name: Runner Docker build
        working-directory: soha-agent
        run: docker build -f deploy/Dockerfile.hermes-agent-runner -t soha-agent:test .
