name: agent-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        default: "v0.1.0-dev"

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - name: Checkout agent
        uses: actions/checkout@v7
        with:
          path: soha-agent
      - name: Checkout contracts
        uses: actions/checkout@v7
        with:
          repository: opensoha/soha-contracts
          path: soha-contracts
          token: ${{ secrets.OPENSOHA_CI_TOKEN || github.token }}
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: soha-agent/go.sum
      - name: Build binary
        working-directory: soha-agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p dist
          date_utc="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w"
          ldflags="${ldflags} -X github.com/opensoha/soha-agent/internal/agent/buildinfo.Version=${VERSION}"
          ldflags="${ldflags} -X github.com/opensoha/soha-agent/internal/agent/buildinfo.Commit=${COMMIT}"
          ldflags="${ldflags} -X github.com/opensoha/soha-agent/internal/agent/buildinfo.Date=${date_utc}"
          GOWORK=off CGO_ENABLED=0 go build -trimpath -ldflags="${ldflags}" -o "dist/soha-agent${{ matrix.ext }}" ./cmd/agent
          artifact="soha-agent_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
          tar -C dist -czf "${artifact}" "soha-agent${{ matrix.ext }}"
          shasum -a 256 "${artifact}" > "${artifact}.sha256"
      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: soha-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            soha-agent/soha-agent_*.tar.gz
            soha-agent/soha-agent_*.tar.gz.sha256
          if-no-files-found: error

  image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout agent
        uses: actions/checkout@v7
        with:
          path: soha-agent
      - name: Checkout contracts
        uses: actions/checkout@v7
        with:
          repository: opensoha/soha-contracts
          path: soha-contracts
          token: ${{ secrets.OPENSOHA_CI_TOKEN || github.token }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build generic agent image
        uses: docker/build-push-action@v6
        with:
          context: soha-agent
          file: soha-agent/deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            yshanchui/soha-agent:${{ github.event.inputs.version || github.ref_name }}
            yshanchui/soha-agent:latest
          build-contexts: |
            contracts=./soha-contracts
          build-args: |
            VERSION=${{ github.event.inputs.version || github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
      - name: Build Hermes runner image
        uses: docker/build-push-action@v6
        with:
          context: soha-agent
          file: soha-agent/deploy/Dockerfile.hermes-agent-runner
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            yshanchui/soha-hermes-agent:${{ github.event.inputs.version || github.ref_name }}
            yshanchui/soha-hermes-agent:latest
          build-contexts: |
            contracts=./soha-contracts
          build-args: |
            VERSION=${{ github.event.inputs.version || github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}

  release-smoke:
    runs-on: ubuntu-latest
    needs:
      - binaries
    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - name: Download linux amd64 binary artifact
        uses: actions/download-artifact@v7
        with:
          name: soha-agent-linux-amd64
          path: smoke
      - name: Smoke test linux amd64 release archive
        run: |
          set -euo pipefail
          archive="$(find smoke -type f -name 'soha-agent_*_linux_amd64.tar.gz' -print -quit)"
          if [ -z "${archive}" ]; then
            echo "linux amd64 release archive not found" >&2
            exit 1
          fi
          checksum="${archive}.sha256"
          test -s "${checksum}"
          (cd "$(dirname "${archive}")" && shasum -a 256 -c "$(basename "${checksum}")")
          tar -xzf "${archive}" -C smoke
          test -x smoke/soha-agent
          ./smoke/soha-agent version | tee smoke/version.txt
          grep -q "soha-agent" smoke/version.txt
          grep -q "${VERSION}" smoke/version.txt

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - binaries
      - image
      - release-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksum manifest
        run: |
          set -euo pipefail
          cd artifacts
          shasum -a 256 soha-agent_*.tar.gz > SHA256SUMS
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/soha-agent_*.tar.gz
            artifacts/soha-agent_*.tar.gz.sha256
            artifacts/SHA256SUMS
      - name: Download published release assets and verify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p downloaded-release
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "soha-agent_*.tar.gz" \
            --pattern "soha-agent_*.tar.gz.sha256" \
            --pattern "SHA256SUMS" \
            --dir downloaded-release \
            --clobber
          test -s downloaded-release/SHA256SUMS
          archive_count="$(find downloaded-release -type f -name 'soha-agent_*.tar.gz' | wc -l | tr -d ' ')"
          checksum_count="$(find downloaded-release -type f -name 'soha-agent_*.tar.gz.sha256' | wc -l | tr -d ' ')"
          test "${archive_count}" -eq 5
          test "${checksum_count}" -eq 5
          (cd downloaded-release && shasum -a 256 -c SHA256SUMS)
          for checksum in downloaded-release/soha-agent_*.tar.gz.sha256; do
            (cd downloaded-release && shasum -a 256 -c "$(basename "${checksum}")")
          done
